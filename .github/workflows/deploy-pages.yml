name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - vault/**
      - scripts/**
      - notes-site/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: notes-site/package-lock.json

      - name: Install root dependencies
        run: |
          cd notes-site
          npm ci

      - name: Build content.js from vault
        run: node scripts/build-content.mjs

      - name: Build site
        run: |
          cd notes-site
          npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: notes-site/dist
